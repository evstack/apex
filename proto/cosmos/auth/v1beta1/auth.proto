syntax = "proto3";

package cosmos.auth.v1beta1;

import "google/protobuf/any.proto";

option go_package = "github.com/evstack/apex/pkg/api/grpc/gen/cosmos/auth/v1beta1;authv1beta1";

message BaseAccount {
  string address = 1;
  google.protobuf.Any pub_key = 2;
  uint64 account_number = 3;
  uint64 sequence = 4;
}
