syntax = "proto3";

package cosmos.base.abci.v1beta1;

option go_package = "github.com/evstack/apex/pkg/api/grpc/gen/cosmos/base/abci/v1beta1;abciv1beta1";

message TxResponse {
  int64 height = 1;
  string txhash = 2;
  string codespace = 3;
  uint32 code = 4;
  string data = 5;
  string raw_log = 6;
  string info = 8;
  int64 gas_wanted = 9;
  int64 gas_used = 10;
  string timestamp = 12;
}
