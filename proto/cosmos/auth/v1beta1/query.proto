syntax = "proto3";

package cosmos.auth.v1beta1;

import "cosmos/auth/v1beta1/auth.proto";

option go_package = "github.com/evstack/apex/pkg/api/grpc/gen/cosmos/auth/v1beta1;authv1beta1";

service Query {
  rpc AccountInfo(QueryAccountInfoRequest) returns (QueryAccountInfoResponse);
}

message QueryAccountInfoRequest {
  string address = 1;
}

message QueryAccountInfoResponse {
  BaseAccount info = 1;
}
